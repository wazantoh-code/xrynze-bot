name = "xrynze-bot"
main = "src/index.js"
compatibility_date = "2025-01-01"

# ==========================================
#  D1 DATABASE BINDING
# ==========================================
[[d1_databases]]
binding = "DB"
database_name = "xrynze-db"
database_id = "536d94bf-46f6-4de3-8539-708c8838ad57"  # Ganti dengan ID database Anda

# ==========================================
#  ENVIRONMENT VARIABLES (Hardcoded di index.js, tidak perlu di sini)
# ==========================================
# Semua konfigurasi (token, username, owner) sudah ditulis langsung di index.js
# Tidak perlu disimpan di sini untuk keamanan.
# Jika ingin menggunakan vars, bisa ditambahkan di bawah:
# [vars]
# BOT_TOKEN = "your-token"
# BOT_USERNAME = "your-bot-username"
# OWNER_ID = "123456789"
# SUPPORT_CHAT = "support-chat"
